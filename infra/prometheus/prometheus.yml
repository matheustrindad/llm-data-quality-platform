global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "airflow"
    static_configs:
      - targets: ["airflow-webserver:8080"]
    metrics_path: "/metrics"

  - job_name: "pipeline"
    static_configs:
      - targets: ["airflow-scheduler:8793"]
    metrics_path: "/metrics"

  - job_name: "minio"
    static_configs:
      - targets: ["minio:9000"]
    metrics_path: "/minio/v2/metrics/cluster"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]